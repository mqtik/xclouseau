name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.35.6"
  APK_BUILD_DIR: "/tmp/build"

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Get version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(sed -n 's/^version: \([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p' app/pubspec.yaml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get tag
        id: get_tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=v${{ steps.get_version.outputs.version }}" >> $GITHUB_OUTPUT
          fi

  build-apk:
    needs: version
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Remove proprietary dependencies
        run: sh scripts/remove_proprietary_dependencies.sh

      - name: Copy files to build dir
        run: |
          mkdir -p $APK_BUILD_DIR
          cp -r . $APK_BUILD_DIR

      - name: Decode key.properties file
        working-directory: ${{ env.APK_BUILD_DIR }}
        env:
          ENCODED_STRING: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          if [ -n "$ENCODED_STRING" ]; then
            echo $ENCODED_STRING | base64 -di > app/android/key.properties
          fi

      - name: Decode android-keystore.jks file
        working-directory: ${{ env.APK_BUILD_DIR }}
        env:
          ENCODED_STRING: ${{ secrets.ANDROID_KEY_STORE }}
        run: |
          if [ -n "$ENCODED_STRING" ]; then
            mkdir -p secrets
            echo $ENCODED_STRING | base64 -di > secrets/android-keystore.jks
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Dependencies
        working-directory: ${{ env.APK_BUILD_DIR }}/app
        run: flutter pub get

      - name: Build APK
        working-directory: ${{ env.APK_BUILD_DIR }}/app
        run: flutter build apk --split-per-abi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-result
          path: |
            ${{ env.APK_BUILD_DIR }}/app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            ${{ env.APK_BUILD_DIR }}/app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            ${{ env.APK_BUILD_DIR }}/app/build/app/outputs/flutter-apk/app-x86_64-release.apk

  build-linux-tar:
    needs: version
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libgtk-3-dev ninja-build libayatana-appindicator3-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Dependencies
        working-directory: app
        run: flutter pub get

      - name: Build linux
        working-directory: app
        run: flutter build linux

      - name: Create tar.gz archive
        run: |
          cd app/build/linux/x64/release/bundle
          tar -czvf ../../../../../result.tar.gz *

      - name: Upload tar.gz artifact
        uses: actions/upload-artifact@v4
        with:
          name: tar-gz-x86-64-result
          path: ./app/*.tar.gz

  build-windows-zip:
    needs: version
    runs-on: windows-latest
    steps:
      - name: Fix long file paths
        run: git config --system core.longpaths true

      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Dependencies
        working-directory: app
        run: flutter pub get

      - name: Build Windows
        working-directory: app
        run: flutter build windows

      - name: Create empty settings.json
        working-directory: app
        run: echo {} > build/windows/x64/runner/Release/settings.json

      - name: Add DLL files
        working-directory: app
        run: |
          Copy-Item ../scripts/windows/x64/msvcp140.dll build/windows/x64/runner/Release/
          Copy-Item ../scripts/windows/x64/vcruntime140.dll build/windows/x64/runner/Release/
          Copy-Item ../scripts/windows/x64/vcruntime140_1.dll build/windows/x64/runner/Release/

      - name: Zip compiled files
        working-directory: app
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath Clouseau.zip

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip-x86-64-result
          path: app/Clouseau.zip

  create-release:
    needs:
      - version
      - build-apk
      - build-linux-tar
      - build-windows-zip
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          mkdir -p release-assets

          cp artifacts/apk-result/app-armeabi-v7a-release.apk "release-assets/Clouseau-${VERSION}-android-arm32v7.apk"
          cp artifacts/apk-result/app-arm64-v8a-release.apk "release-assets/Clouseau-${VERSION}-android-arm64v8.apk"
          cp artifacts/apk-result/app-x86_64-release.apk "release-assets/Clouseau-${VERSION}-android-x64.apk"

          cp artifacts/tar-gz-x86-64-result/*.tar.gz "release-assets/Clouseau-${VERSION}-linux-x86-64.tar.gz"
          cp artifacts/windows-zip-x86-64-result/*.zip "release-assets/Clouseau-${VERSION}-windows-x86-64.zip"

          ls -la release-assets/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" release-assets/* --clobber
          else
            gh release create "$TAG" release-assets/* \
              --title "v${VERSION}" \
              --draft \
              --generate-notes
          fi
