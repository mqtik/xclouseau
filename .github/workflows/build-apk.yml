name: Build APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.35.6"
  APK_BUILD_DIR: "/tmp/build"

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(sed -n 's/^version: \([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p' app/pubspec.yaml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Remove proprietary dependencies
        run: sh scripts/remove_proprietary_dependencies.sh

      - name: Copy files to build dir
        run: |
          mkdir -p $APK_BUILD_DIR
          cp -r . $APK_BUILD_DIR

      - name: Decode key.properties file
        working-directory: ${{ env.APK_BUILD_DIR }}
        env:
          ENCODED_STRING: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          if [ -n "$ENCODED_STRING" ]; then
            echo $ENCODED_STRING | base64 -di > app/android/key.properties
          else
            echo "No signing key configured, building debug-signed APK"
          fi

      - name: Decode android-keystore.jks file
        working-directory: ${{ env.APK_BUILD_DIR }}
        env:
          ENCODED_STRING: ${{ secrets.ANDROID_KEY_STORE }}
        run: |
          if [ -n "$ENCODED_STRING" ]; then
            mkdir -p secrets
            echo $ENCODED_STRING | base64 -di > secrets/android-keystore.jks
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Dependencies
        working-directory: ${{ env.APK_BUILD_DIR }}/app
        run: flutter pub get

      - name: Build APK
        working-directory: ${{ env.APK_BUILD_DIR }}/app
        run: flutter build apk --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: clouseau-apk-${{ steps.get_version.outputs.version }}
          path: |
            ${{ env.APK_BUILD_DIR }}/app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            ${{ env.APK_BUILD_DIR }}/app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            ${{ env.APK_BUILD_DIR }}/app/build/app/outputs/flutter-apk/app-x86_64-release.apk

      - name: Upload APKs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${{ steps.get_version.outputs.version }}
          APK_DIR="${{ env.APK_BUILD_DIR }}/app/build/app/outputs/flutter-apk"

          cp "$APK_DIR/app-armeabi-v7a-release.apk" "Clouseau-${VERSION}-android-arm32v7.apk"
          cp "$APK_DIR/app-arm64-v8a-release.apk" "Clouseau-${VERSION}-android-arm64v8.apk"
          cp "$APK_DIR/app-x86_64-release.apk" "Clouseau-${VERSION}-android-x64.apk"

          gh release upload "$TAG" \
            "Clouseau-${VERSION}-android-arm32v7.apk" \
            "Clouseau-${VERSION}-android-arm64v8.apk" \
            "Clouseau-${VERSION}-android-x64.apk" \
            --clobber
